# → /etc/cloud/cloud.cfg.d/99-pve.cfg
datasource_list: [NoCloud]     # Proxmox cloud-init drive only; fast, deterministic boot

preserve_hostname: false
manage_etc_hosts: true

ssh_pwauth: false              # key-only by default; clones opt in via user-data if they must
ssh_genkeytypes: [rsa, ecdsa, ed25519]

growpart:
  mode: auto
  devices: ["/"]
resize_rootfs: true

system_info:
  network:
    renderers: [eni]           # /etc/network/interfaces, driven by ifupdown-ng
